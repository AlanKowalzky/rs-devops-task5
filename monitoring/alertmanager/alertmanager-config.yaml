alertmanager:
  config:
    global:
      resolve_timeout: 5m
      # Poniższe wartości zostaną wstrzyknięte przez Terraform z pliku terraform.tfvars
      # smtp_smarthost: 'smtp.gmail.com:587'
      # smtp_from: 'alan.kowazlzy@gmail.com'
      # smtp_auth_username: 'alan.kowazlzy@gmail.com'
      # smtp_auth_password: 'SECRET_PASSWORD'
    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'email-notifications'
    receivers:
      - name: 'email-notifications'
        email_configs:
          - to: 'alan.kowazlzy@gmail.com' # Ta wartość zostanie nadpisana przez zmienną z terraform.tfvars
            send_resolved: true
